# Google Cloud Platform Configuration
# Runtime configuration for setup_gcp.py
# Resource orchestration is configured in gcp_components.yaml

project:
  id: "your-project-id"
  name: "your-project-name"
  number: "your-project-number"

# gcloud CLI configuration
gcloud:
  configuration_name: "gcp-automation"
  account: ""  # Optional: set to your Google account email
  run_region: ""
  compute_region: ""
  compute_zone: ""

# Authentication behavior
auth:
  login_if_needed: true
  create_application_default_credentials: false
  set_quota_project_for_adc: true

# Global defaults used by component actions unless overridden per-component
defaults:
  service_account:
    name: "example-service-account"
    display_name: "Example Service Account"
    description: "Service account used for automation examples"

  credentials:
    key_file: "service-account-key.json"
    key_path: "./credentials"
    overwrite_local_key: false
    allow_new_key_creation_if_keys_exist: false
    delete_existing_user_managed_keys_before_create: false
    write_env_file: true
    env_file: ".env.gcp"
    activate_service_account_for_gcloud: false
    persist_google_application_credentials: false
    persist_google_cloud_project: false

execution:
  dry_run: false

# Separate orchestration config for all GCP actionable components
components_config:
  path: "gcp_components.yaml"
